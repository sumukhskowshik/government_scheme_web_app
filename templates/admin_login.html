<!DOCTYPE html>
<html>

<head>

    <title>Admin Login - Govt Schemes Portal</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        body{

            margin: 0;
            padding: 0;

            font-family: Arial, sans-serif;

            min-height: 100vh;

            background:
                    linear-gradient(rgba(13,71,161,0.88),
                    rgba(21,101,192,0.88)),

                    url("/static/images/bg.png");

            background-size: cover;
            background-position: center;

            display: flex;
            align-items: center;
            justify-content: center;

        }

        /* LOGIN CONTAINER */
        .login-container{
            width: 100%;
            padding: 20px;
        }

        /* LOGIN CARD */
        .login-card{

            background: rgba(255,255,255,0.97);

            border-radius: 28px;

            padding: 45px;

            box-shadow: 0 20px 50px rgba(0,0,0,0.25);

            backdrop-filter: blur(10px);

        }

        /* ICON */
        .login-icon{
            font-size: 60px;
        }

        /* TITLE */
        .login-title{

            color: #0d47a1;

            font-weight: 800;

            margin-top: 12px;

        }

        .login-subtitle{
            color: #666;
            margin-top: 10px;
        }

        /* FORM */
        .form-label{
            font-weight: 600;
            color: #333;
        }

        .form-control{

            border-radius: 14px;

            padding: 12px;

            border: 1px solid #d0d7e2;

            transition: 0.3s;

        }

        .form-control:focus{

            border-color: #0d47a1;

            box-shadow: 0 0 0 0.15rem rgba(13,71,161,0.15);

        }

        /* BUTTON */
        .login-btn{

            border-radius: 30px;

            padding: 12px;

            font-weight: 600;

            margin-top: 10px;

        }

        /* SECURITY BOX */
        .security-box{

            background: linear-gradient(to right, #e3f2fd, #f5fbff);

            border-left: 5px solid #0d47a1;

            border-radius: 16px;

            padding: 18px;

            margin-top: 25px;

        }

        .security-box h6{
            color: #0d47a1;
            font-weight: 700;
        }

        .security-box p{
            margin-bottom: 0;
            color: #555;
            font-size: 14px;
        }

        /* BACK BUTTON */
        .back-home{

            text-decoration: none;

            color: #0d47a1;

            font-weight: 600;

            display: inline-block;

            margin-top: 22px;

        }

        .back-home:hover{
            text-decoration: underline;
        }

        @media(max-width:768px){

            .login-card{
                padding: 35px 25px;
            }

        }

    </style>

</head>

<body>

<div class="login-container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="login-card">

                <!-- HEADER -->
                <div class="text-center">

                    <div class="login-icon">
                        🛡️
                    </div>

                    <h2 class="login-title">
                        Admin Login
                    </h2>

                    <p class="login-subtitle">

                        Secure administrator access to the government portal

                    </p>

                </div>

                <!-- FORM -->
                <form method="POST" class="mt-4">

                    <div class="mb-3">

                        <label class="form-label">
                            Admin Email
                        </label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Enter Admin Email"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter Password"
                               required>

                    </div>

                    <button class="btn btn-primary w-100 login-btn">

                        Login

                    </button>

                    <!-- SECURITY -->
                    <div class="security-box">

                        <h6>
                            Secure Access
                        </h6>

                        <p>

                            This portal section is restricted to authorized
                            administrators only.

                        </p>

                    </div>

                    <!-- HOME -->
                    <div class="text-center">

                        <a href="/"
                           class="back-home">

                            ← Back to Home

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
