<!DOCTYPE html>
<html>

<head>

    <title>Member Registration - Govt Schemes Portal</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{

            margin: 0;
            padding: 0;

            font-family: Arial, sans-serif;

            min-height: 100vh;

            background:
                    linear-gradient(rgba(13,71,161,0.88),
                    rgba(21,101,192,0.88)),

                    url("/static/images/bg.png");

            background-size: cover;
            background-position: center;

        }

        /* PAGE */
        .register-wrapper{
            padding: 50px 15px;
        }

        /* CARD */
        .register-card{

            background: rgba(255,255,255,0.97);

            border-radius: 30px;

            padding: 45px;

            box-shadow: 0 20px 50px rgba(0,0,0,0.25);

            backdrop-filter: blur(10px);

        }

        /* HEADER */
        .register-icon{
            font-size: 60px;
        }

        .register-title{

            color: #0d47a1;

            font-weight: 800;

            margin-top: 12px;

        }

        .register-subtitle{
            color: #666;
            margin-top: 10px;
        }

        /* FORM */
        .form-label{
            font-weight: 600;
            color: #333;
        }

        .form-control,
        .form-select{

            border-radius: 14px;

            padding: 12px;

            border: 1px solid #d0d7e2;

            transition: 0.3s;

        }

        .form-control:focus,
        .form-select:focus{

            border-color: #0d47a1;

            box-shadow: 0 0 0 0.15rem rgba(13,71,161,0.15);

        }

        /* BUTTON */
        .register-btn{

            border-radius: 30px;

            padding: 12px;

            font-weight: 600;

            margin-top: 12px;

        }

        /* LOGIN LINK */
        .login-text{
            margin-top: 22px;
            color: #555;
        }

        .login-text a{

            text-decoration: none;

            color: #0d47a1;

            font-weight: 600;

        }

        .login-text a:hover{
            text-decoration: underline;
        }

        /* INFO BOX */
        .info-box{

            background: linear-gradient(to right, #e3f2fd, #f5fbff);

            border-left: 5px solid #0d47a1;

            border-radius: 16px;

            padding: 18px;

            margin-top: 25px;

        }

        .info-box h6{
            color: #0d47a1;
            font-weight: 700;
        }

        .info-box p{
            margin-bottom: 0;
            color: #555;
            font-size: 14px;
            line-height: 1.7;
        }

        @media(max-width:768px){

            .register-card{
                padding: 35px 22px;
            }

        }

    </style>

</head>

<body>

<div class="register-wrapper">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="register-card">

                    <!-- HEADER -->
                    <div class="text-center">

                        <div class="register-icon">
                            📝
                        </div>

                        <h2 class="register-title">
                            Member Registration
                        </h2>

                        <p class="register-subtitle">

                            Create your account to access government welfare schemes

                        </p>

                    </div>

                    <!-- FORM -->
                    <form method="POST" class="mt-4">

                        <div class="row">

                            <!-- NAME -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input type="text"
                                       name="name"
                                       class="form-control"
                                       placeholder="Enter full name"
                                       required>

                            </div>

                            <!-- EMAIL -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input type="email"
                                       name="email"
                                       class="form-control"
                                       placeholder="Enter email"
                                       required>

                            </div>

                            <!-- PASSWORD -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <input type="password"
                                       name="password"
                                       class="form-control"
                                       placeholder="Create password"
                                       required>

                            </div>

                            <!-- AGE -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Age
                                </label>

                                <input type="number"
                                       name="age"
                                       class="form-control"
                                       placeholder="Enter age"
                                       required>

                            </div>

                            <!-- GENDER -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Gender
                                </label>

                                <select name="gender"
                                        class="form-select"
                                        required>

                                    <option value="">
                                        Select Gender
                                    </option>

                                    <option value="male">
                                        Male
                                    </option>

                                    <option value="female">
                                        Female
                                    </option>

                                    <option value="other">
                                        Other
                                    </option>

                                </select>

                            </div>

                            <!-- CASTE -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Caste
                                </label>

                                <select name="caste"
                                        class="form-select"
                                        required>

                                    <option value="">
                                        Select Caste
                                    </option>

                                    <option value="general">
                                        General
                                    </option>

                                    <option value="obc">
                                        OBC
                                    </option>

                                    <option value="sc">
                                        SC
                                    </option>

                                    <option value="st">
                                        ST
                                    </option>

                                </select>

                            </div>

                            <!-- USER TYPE -->
                            <div class="col-md-12 mb-3">

                                <label class="form-label">
                                    User Type
                                </label>

                                <select name="userType"
                                        class="form-select"
                                        required>

                                    <option value="">
                                        Select User Type
                                    </option>

                                    <option value="student">
                                        Student
                                    </option>

                                    <option value="farmer">
                                        Farmer
                                    </option>

                                    <option value="employee">
                                        Employee
                                    </option>

                                    <option value="business">
                                        Business
                                    </option>

                                    <option value="women">
                                        Women
                                    </option>

                                    <option value="senior">
                                        Senior Citizen
                                    </option>

                                </select>

                            </div>

                        </div>

                        <!-- BUTTON -->
                        <button class="btn btn-primary w-100 register-btn">

                            Register

                        </button>

                        <!-- LOGIN -->
                        <p class="text-center login-text">

                            Already have an account?

                            <a href="/member-login">

                                Login Here

                            </a>

                        </p>

                        <!-- INFO -->
                        <div class="info-box">

                            <h6>
                                Registration Information
                            </h6>

                            <p>

                                Your details will be securely stored and used
                                only for eligibility verification and government
                                welfare services.

                            </p>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
